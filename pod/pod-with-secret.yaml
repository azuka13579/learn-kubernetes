apiVersion: v1
kind: Pod
metadata:
  name: demo-app
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: config-volume
          mountPath: /app/secret
  volumes:
    - name: config-volume
      secret:
        secretName: app-secret-1